<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고래시티 - 멀티뷰</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --card-bg: #141414;
            --header-bg: #0f0f0f;
            --accent: #4facfe;
            --accent-dim: rgba(79, 172, 254, 0.15);
            --accent-border: rgba(79, 172, 254, 0.4);
            --text-white: #ffffff;
            --text-gray: rgba(255,255,255,0.5);
            --border: rgba(255,255,255,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "Pretendard Variable", Pretendard, -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text-white);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* ================================
           공통 버튼
           ================================ */
        .filter-btn {
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border);
            color: var(--text-gray);
            padding: 5px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            font-family: inherit;
            transition: 0.2s;
            white-space: nowrap;
        }
        .filter-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .filter-btn.active {
            background: var(--accent-dim);
            color: var(--accent);
            border-color: var(--accent-border);
        }

        /* ================================
           대기실
           ================================ */
        #waiting-room {
            position: fixed;
            inset: 0;
            background: rgba(10, 10, 10, 0.98);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 60px;
            overflow-y: auto;
            transition: opacity 0.3s;
        }
        #waiting-room.hidden { opacity: 0; pointer-events: none; }

        .wr-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .wr-title {
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: -0.5px;
            color: var(--accent);
            margin-bottom: 8px;
        }
        .wr-subtitle {
            font-size: 0.9rem;
            color: var(--text-gray);
        }

        .wr-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
            width: 90%;
            max-width: 1400px;
            padding-bottom: 60px;
        }

        .wr-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
            position: relative;
        }
        .wr-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent-border);
            box-shadow: 0 8px 30px rgba(79,172,254,0.15);
        }
        .wr-card img {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            display: block;
        }
        .wr-info { padding: 14px 16px; }
        .wr-name {
            font-size: 1rem;
            font-weight: 800;
            margin-bottom: 4px;
        }
        .wr-title-text {
            font-size: 0.82rem;
            color: rgba(255,255,255,0.55);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .wr-viewers {
            font-size: 0.78rem;
            color: var(--accent);
            margin-top: 6px;
            font-weight: 700;
        }
        .wr-badge {
            position: absolute;
            top: 10px; left: 10px;
            padding: 3px 9px;
            border-radius: 4px;
            font-size: 0.72rem;
            font-weight: 800;
            color: #000;
            background: var(--accent);
            letter-spacing: 0.5px;
        }

        /* ================================
           헤더
           ================================ */
        header {
            background: var(--header-bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: all 0.3s ease;
            z-index: 5000;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 24px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
        }

        .header-controls { display: flex; align-items: center; gap: 10px; }

        .home-btn {
            background: var(--accent);
            border: none;
            padding: 7px 16px;
            border-radius: 8px;
            color: #000;
            font-weight: 800;
            font-size: 0.85rem;
            font-family: inherit;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 0.3px;
        }
        .home-btn:hover { background: #7ec8ff; }

        #toggle-view-btn {
            background: rgba(255,255,255,0.07);
            border: 1px solid var(--border);
            color: var(--text-gray);
            padding: 5px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            font-family: inherit;
            transition: 0.2s;
            z-index: 5001;
        }
        #toggle-view-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }

        .selected-count-badge {
            font-size: 0.78rem;
            color: var(--text-gray);
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border);
            padding: 4px 10px;
            border-radius: 20px;
        }
        .selected-count-badge span { color: var(--accent); font-weight: 700; }

        /* 멤버 리스트 컨테이너 */
        #member-list-container {
            padding: 10px 24px;
            background: var(--card-bg);
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;
            transition: height 0.3s ease, padding 0.3s ease;
        }
        #member-list-container::-webkit-scrollbar { height: 4px; }
        #member-list-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
        #member-list-container::-webkit-scrollbar-track { background: transparent; }

        #member-list { display: flex; flex-wrap: nowrap; gap: 10px; }

        /* 확장 모드 (썸네일) */
        header.expanded #member-list-container { height: 160px; }
        header.expanded .member-item {
            width: 140px;
            flex-shrink: 0;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            overflow: hidden;
            transition: border-color 0.2s, background 0.2s;
        }
        header.expanded .member-item:hover {
            border-color: var(--accent-border);
            background: rgba(255,255,255,0.07);
        }
        header.expanded .member-thumb { width: 100%; height: 79px; object-fit: cover; background: #111; display: block; }
        header.expanded .member-info { padding: 7px 8px; text-align: center; }
        header.expanded .member-name { font-size: 0.82rem; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        header.expanded .member-status { font-size: 0.72rem; color: var(--text-gray); margin-top: 2px; }

        /* 축소 모드 (이름만) */
        header.collapsed #member-list-container { height: 50px; padding: 8px 24px; }
        header.collapsed .member-item {
            display: flex;
            align-items: center;
            padding: 6px 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 20px;
            cursor: pointer;
            flex-shrink: 0;
            transition: 0.2s;
        }
        header.collapsed .member-item:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.2);
        }
        header.collapsed .member-thumb,
        header.collapsed .member-status { display: none; }
        header.collapsed .member-name { font-size: 0.88rem; font-weight: 600; margin: 0; }

        /* 숨김 모드 */
        header.hidden {
            position: absolute;
            top: 0; left: 0; right: 0;
            background: transparent;
            border-bottom: none;
            pointer-events: none;
        }
        header.hidden .header-top {
            background: transparent;
            justify-content: flex-end;
            padding: 10px 20px;
        }
        header.hidden .header-controls,
        header.hidden .header-info-group,
        header.hidden #member-list-container { display: none !important; }
        header.hidden #toggle-view-btn {
            pointer-events: auto;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(8px);
            opacity: 0.6;
        }
        header.hidden #toggle-view-btn:hover { opacity: 1; background: rgba(0,0,0,0.85); }

        /* 활성화 / 오프라인 */
        .member-item.active {
            border-color: var(--accent) !important;
            background: var(--accent-dim) !important;
        }
        .member-item.active .member-name { color: var(--accent); }
        .member-item.offline { display: none; }

        /* ================================
           비디오 그리드
           ================================ */
        #view-grid {
            flex-grow: 1;
            display: grid;
            gap: 3px;
            background: #000;
            position: relative;
        }
        .grid-1 { grid-template-columns: 1fr; }
        .grid-2 { grid-template-columns: 1fr 1fr; }
        .grid-3, .grid-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }

        .video-wrapper { position: relative; width: 100%; height: 100%; background: #0a0a0a; }
        iframe { width: 100%; height: 100%; border: none; display: block; }

        .empty-msg {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255,255,255,0.2);
            text-align: center;
        }
        .empty-msg h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 14px; }
        .empty-msg button {
            padding: 10px 24px;
            background: rgba(255,255,255,0.07);
            border: 1px solid var(--border);
            color: rgba(255,255,255,0.6);
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 600;
            transition: 0.2s;
        }
        .empty-msg button:hover {
            background: var(--accent-dim);
            border-color: var(--accent-border);
            color: var(--accent);
        }

        .close-btn {
            position: absolute;
            top: 8px; right: 8px;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.7);
            border-radius: 6px;
            width: 26px; height: 26px;
            cursor: pointer;
            z-index: 10;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .close-btn:hover {
            background: rgba(220,38,38,0.5);
            border-color: #ef4444;
            color: #fff;
        }
    </style>
</head>
<body>

    <!-- 대기실 -->
    <div id="waiting-room">
        <div class="wr-header">
            <div class="wr-title">🐳 고래시티 LIVE 멀티뷰</div>
            <div class="wr-subtitle">시청할 멤버를 선택하면 바로 이동합니다.</div>
        </div>
        <div id="wr-grid" class="wr-grid"></div>
    </div>

    <!-- 헤더 -->
    <header id="main-header" class="expanded">
        <div class="header-top">
            <div class="header-controls">
                <button class="home-btn" onclick="showWaitingRoom()">🏠 대기실</button>
                <button class="filter-btn active" onclick="renderHeaderList()">전체 멤버</button>
            </div>
            <div style="display:flex; align-items:center; gap:10px;">
                <span class="selected-count-badge header-info-group">
                    <span id="selected-count">0</span>/4 선택
                </span>
                <button id="toggle-view-btn" onclick="toggleHeaderMode()">🔽 접기</button>
            </div>
        </div>
        <div id="member-list-container">
            <div id="member-list"></div>
        </div>
    </header>

    <!-- 비디오 그리드 -->
    <div id="view-grid" class="grid-1">
        <div class="empty-msg">
            <h2>화면을 선택해주세요</h2>
            <button onclick="showWaitingRoom()">대기실 열기</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
